name: Deploy to cPanel

on:
  push:
    branches: ["main"]   # deploy on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug FTP_SERVER
        run: echo "FTP_SERVER=${{ secrets.FTP_SERVER }}"

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: demo.cycology.com.ng 
          username: ftpst@demo.cycology.com.ng
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./          # folder to upload
          server-dir: / 
          timeout: 600000
          log-level: verbose
