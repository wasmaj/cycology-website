<?xml version="1.0" encoding="UTF-8"?>
<!--
  Cycology logo — full lock-up with wordmark.
  Built from the brand's 5 identity colours:
    yellow #FFD744   cyan #46BFE0   orange #F39200
    pink   #D60B52   black #1D1D1B
  Use this variant on light backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Cycology">
  <title>Cycology</title>

  <!-- Orange triangle (handlebar accent / top) -->
  <polygon points="385,38 415,38 400,80" fill="#F39200"/>

  <!-- Cyan triangle (frame / seat element) -->
  <polygon points="355,108 445,108 400,180" fill="#46BFE0"/>

  <!-- Left wheel — pink open ring -->
  <circle cx="240" cy="280" r="98" fill="none" stroke="#D60B52" stroke-width="28"/>

  <!-- Right wheel — yellow ring with pink hub and tiny yellow centre -->
  <circle cx="560" cy="280" r="98" fill="none" stroke="#FFD744" stroke-width="28"/>
  <circle cx="560" cy="280" r="52" fill="#D60B52"/>
  <circle cx="560" cy="280" r="14" fill="#FFD744"/>

  <!-- Wordmark -->
  <text x="400" y="470" text-anchor="middle"
        font-family="'Open Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="76" letter-spacing="4"
        fill="#1D1D1B">CYCOLOGY</text>
</svg>
